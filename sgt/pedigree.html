<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Pedigree — SGT</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="topbar-container"></div>
      <div class="page-header">
        <a href="ejemplares.html" class="text-sm" style="color:var(--text-secondary)">← Volver a Ejemplares</a>
        <h1 style="margin-top:.5rem">🌳 Árbol Genealógico</h1>
        <p>Pedigree de 3 generaciones</p>
      </div>

      <!-- Bird selector -->
      <div class="card mb-6" style="padding:1rem">
        <div class="flex gap-4 items-center">
          <label class="form-label" style="margin:0;white-space:nowrap">Seleccionar Ave:</label>
          <select class="form-select" id="pedigree-select" onchange="renderPedigree(this.value)" style="flex:1">
            <option value="">— Seleccionar —</option>
          </select>
        </div>
      </div>

      <!-- Pedigree tree -->
      <div class="card" style="overflow-x:auto;padding:2rem">
        <div id="pedigree-container"></div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!SGT.requireAuth()) throw 'no auth';
    document.getElementById('sidebar-container').innerHTML = SGT.renderSidebar('pedigree');
    document.getElementById('topbar-container').innerHTML = SGT.renderTopBar();
    SGT.init();

    // Populate selector
    const allBirds = DB.getAll('ejemplares');
    const select = document.getElementById('pedigree-select');
    allBirds.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.placa_ala;
      opt.textContent = `${b.nombre} (${b.placa_ala}) — ${b.linea_genetica}`;
      select.appendChild(opt);
    });

    // Check URL param
    const params = new URLSearchParams(window.location.search);
    const initialPlaca = params.get('placa');
    if (initialPlaca) {
      select.value = initialPlaca;
      renderPedigree(initialPlaca);
    }

    function findBird(placa) {
      return DB.getById('ejemplares', placa, 'placa_ala');
    }

    function buildTree(placa, depth = 0, maxDepth = 3) {
      if (depth >= maxDepth || !placa) return null;
      const bird = findBird(placa);
      if (!bird) {
        // External reference (text only, no FK)
        return { placa_ala: placa, nombre: placa, sexo: 'Desconocido', linea_genetica: '?', external: true, padre: null, madre: null };
      }
      return {
        ...bird,
        external: false,
        padre: buildTree(bird.padre_placa, depth + 1, maxDepth),
        madre: buildTree(bird.madre_placa, depth + 1, maxDepth)
      };
    }

    function renderNode(node, label) {
      if (!node) return `<div class="pedigree-node" style="opacity:.3;border-left:3px solid var(--text-tertiary)"><div class="name">Desconocido</div><div class="placa">—</div></div>`;
      const sexClass = node.sexo === 'Macho' ? 'male' : node.sexo === 'Hembra' ? 'female' : '';
      const extStyle = node.external ? 'opacity:.6;border-style:dashed' : '';
      const clickAction = node.external ? '' : `onclick="renderPedigree('${node.placa_ala}');document.getElementById('pedigree-select').value='${node.placa_ala}'"`;
      return `
        <div class="pedigree-node ${sexClass}" style="${extStyle}" ${clickAction}>
          <div class="placa" style="font-size:.65rem;color:var(--text-tertiary)">${label || ''}</div>
          <div class="name">${node.nombre || node.placa_ala}</div>
          <div class="placa">${node.placa_ala}</div>
          <div class="linea">${node.linea_genetica || ''}</div>
          ${node.sexo ? `<div style="font-size:.65rem;margin-top:.25rem"><span class="badge ${node.sexo==='Macho'?'badge-info':node.sexo==='Hembra'?'badge-warning':'badge-gold'}" style="font-size:.6rem">${node.sexo}</span></div>` : ''}
        </div>`;
    }

    function renderPedigree(placa) {
      if (!placa) { document.getElementById('pedigree-container').innerHTML = '<div class="empty-state"><div class="icon">🌳</div><p>Selecciona un ave para ver su pedigree</p></div>'; return; }

      const tree = buildTree(placa, 0, 3);
      if (!tree) { document.getElementById('pedigree-container').innerHTML = '<div class="empty-state"><p>Ave no encontrada</p></div>'; return; }

      // Build visual tree: G0 (subject) -> G1 (parents) -> G2 (grandparents) -> G3 (great-grandparents)
      const g1p = tree.padre;
      const g1m = tree.madre;
      const g2pp = g1p ? g1p.padre : null;
      const g2pm = g1p ? g1p.madre : null;
      const g2mp = g1m ? g1m.padre : null;
      const g2mm = g1m ? g1m.madre : null;

      document.getElementById('pedigree-container').innerHTML = `
        <div style="text-align:center;margin-bottom:1.5rem">
          <span class="badge badge-gold" style="font-size:.9rem;padding:6px 16px">🐓 ${tree.nombre} (${tree.placa_ala})</span>
          <p class="text-sm mt-2" style="color:var(--text-secondary)">${tree.linea_genetica || ''} · ${tree.sexo} · ${tree.rol || ''}</p>
        </div>
        <div class="pedigree-tree" style="justify-content:center">
          <!-- G0: Subject -->
          <div class="pedigree-gen">
            ${renderNode(tree, 'SUJETO')}
          </div>

          <div style="display:flex;align-items:center;color:var(--text-tertiary);font-size:1.5rem">→</div>

          <!-- G1: Parents -->
          <div class="pedigree-gen">
            ${renderNode(g1p, '♂ PADRE')}
            ${renderNode(g1m, '♀ MADRE')}
          </div>

          <div style="display:flex;align-items:center;color:var(--text-tertiary);font-size:1.5rem">→</div>

          <!-- G2: Grandparents -->
          <div class="pedigree-gen" style="gap:.5rem">
            ${renderNode(g2pp, '♂ Abuelo P')}
            ${renderNode(g2pm, '♀ Abuela P')}
            ${renderNode(g2mp, '♂ Abuelo M')}
            ${renderNode(g2mm, '♀ Abuela M')}
          </div>
        </div>

        <div style="text-align:center;margin-top:2rem">
          <p class="text-xs" style="color:var(--text-tertiary)">💡 Haz clic en cualquier ancestro para centrar el árbol en ese ejemplar</p>
          <p class="text-xs" style="color:var(--text-tertiary)">Los nodos con borde punteado son referencias externas (no registrados en el sistema)</p>
        </div>
      `;
    }
  </script>
</body>
</html>
