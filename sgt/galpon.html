<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mi Galpón — SGT</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="topbar-container"></div>
      <div class="page-header flex items-center justify-between">
        <div><h1>🏠 Mi Galpón</h1><p>Gestión de galpones y ubicación</p></div>
        <button class="btn btn-primary" onclick="SGT.openModal('modal-galpon')">+ Nuevo Galpón</button>
      </div>

      <div id="galpones-grid" class="grid grid-2 gap-6 stagger"></div>

      <!-- Modal -->
      <div id="modal-galpon" class="modal-overlay hidden" style="display:none">
        <div class="modal">
          <div class="modal-header">
            <h3 id="modal-galpon-title">Nuevo Galpón</h3>
            <button class="btn btn-ghost btn-icon" onclick="SGT.closeModal('modal-galpon')">✕</button>
          </div>
          <div class="modal-body">
            <form onsubmit="saveGalpon(event)">
              <input type="hidden" id="galpon-edit-id">
              <div class="form-group">
                <label class="form-label">Nombre del Galpón</label>
                <input type="text" class="form-input" id="galpon-nombre" placeholder="Ej: Galpón El Campeón" required>
              </div>
              <div class="form-group">
                <label class="form-label">Ubicación</label>
                <input type="text" class="form-input" id="galpon-ubicacion" placeholder="Ej: Chiclayo, Lambayeque" required>
              </div>
              <div class="form-group">
                <label class="form-label">URL de foto (opcional)</label>
                <input type="text" class="form-input" id="galpon-foto" placeholder="https://...">
              </div>
              <div class="modal-footer" style="padding:1rem 0 0;border:none">
                <button type="button" class="btn btn-ghost" onclick="SGT.closeModal('modal-galpon')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!SGT.requireAuth()) throw 'no auth';
    document.getElementById('sidebar-container').innerHTML = SGT.renderSidebar('galpon');
    document.getElementById('topbar-container').innerHTML = SGT.renderTopBar();
    SGT.init();

    function renderGalpones() {
      const galpones = DB.getAll('galpones');
      const user = SGT.getUser();
      document.getElementById('galpones-grid').innerHTML = galpones.map(g => {
        const aves = DB.filter('ejemplares', e => e.galpon_id === g.id).length;
        const esTitular = g.titular_id === user.id;
        return `
        <div class="card" style="position:relative;overflow:hidden">
          <div style="height:120px;background:linear-gradient(135deg,rgba(212,160,23,.15),rgba(212,160,23,.05));border-radius:var(--radius-md);margin-bottom:1rem;display:flex;align-items:center;justify-content:center;font-size:3rem">🏠</div>
          <div class="flex items-center justify-between">
            <h3 style="font-weight:700;font-size:1.125rem">${g.nombre}</h3>
            ${esTitular ? '<span class="badge badge-gold">Titular</span>' : '<span class="badge badge-info">Delegado</span>'}
          </div>
          <p class="text-sm mt-2" style="color:var(--text-secondary)">📍 ${g.ubicacion}</p>
          <div class="flex items-center gap-4 mt-4" style="padding-top:.75rem;border-top:1px solid var(--glass-border)">
            <span class="text-sm" style="color:var(--text-secondary)">🐔 ${aves} ejemplares</span>
            <span style="flex:1"></span>
            <button class="btn btn-ghost btn-sm" onclick="editGalpon('${g.id}')">✏️ Editar</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteGalpon('${g.id}')">🗑️</button>
          </div>
        </div>`;
      }).join('') || '<div class="empty-state card" style="grid-column:1/-1"><div class="icon">🏠</div><p>No tienes galpones registrados</p><button class="btn btn-primary" onclick="SGT.openModal(\'modal-galpon\')">Crear mi primer galpón</button></div>';
    }

    function saveGalpon(e) {
      e.preventDefault();
      const id = document.getElementById('galpon-edit-id').value;
      const data = {
        nombre: document.getElementById('galpon-nombre').value,
        ubicacion: document.getElementById('galpon-ubicacion').value,
        foto_url: document.getElementById('galpon-foto').value
      };
      if (id) {
        DB.update('galpones', id, data);
        SGT.toast('Galpón actualizado');
      } else {
        data.id = 'g-' + SGT.uuid();
        data.titular_id = SGT.getUser().id;
        DB.add('galpones', data);
        SGT.toast('Galpón creado exitosamente');
      }
      SGT.closeModal('modal-galpon');
      renderGalpones();
    }

    function editGalpon(id) {
      const g = DB.getById('galpones', id);
      document.getElementById('galpon-edit-id').value = id;
      document.getElementById('galpon-nombre').value = g.nombre;
      document.getElementById('galpon-ubicacion').value = g.ubicacion;
      document.getElementById('galpon-foto').value = g.foto_url || '';
      document.getElementById('modal-galpon-title').textContent = 'Editar Galpón';
      SGT.openModal('modal-galpon');
    }

    function deleteGalpon(id) {
      if (!confirm('¿Eliminar este galpón?')) return;
      DB.remove('galpones', id);
      SGT.toast('Galpón eliminado', 'error');
      renderGalpones();
    }

    renderGalpones();
  </script>
</body>
</html>
